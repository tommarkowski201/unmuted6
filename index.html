<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unmuted | District Master Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfcfb; --card: #ffffff; --text: #1e293b; --secondary: #64748b;
            --gold: #d4af37; --danger: #f43f5e; --accent: #10b981; --warn: #f59e0b; --admin: #4f46e5; --creator: #8b5cf6;
        }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- CLEAN SIDEBAR --- */
        #sos-sidebar {
            width: 75px; background: var(--danger); color: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; position: fixed;
            left: 0; top: 0; bottom: 0; z-index: 5000; transition: 0.4s;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        #sos-text { transform: rotate(-90deg); white-space: nowrap; font-weight: 800; font-size: 1.2rem; letter-spacing: 3px; }
        
        /* --- CENTERING & LAYOUT --- */
        #app-shell { margin-left: 75px; width: 100%; display: flex; flex-direction: column; min-height: 100vh; }
        .screen { display: none; width: 100%; flex: 1; padding: 40px; box-sizing: border-box; animation: fadeIn 0.4s ease forwards; }
        #screen-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 0; }

        .glass-card { background: var(--card); padding: 30px; border-radius: 32px; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.04); width: 100%; max-width: 900px; margin: 0 auto 20px auto; }
        .login-box { max-width: 400px !important; text-align: center; }
        
        input { width: 100%; padding: 18px; margin: 12px 0; border-radius: 18px; border: 1px solid #e2e8f0; font-family: inherit; font-size: 1rem; box-sizing: border-box; background: #fcfcfc; }
        button { cursor: pointer; border: none; border-radius: 16px; font-weight: 600; padding: 16px; transition: 0.2s; width: 100%; font-family: inherit; }
        .btn-primary { background: var(--gold); color: white; font-size: 1.1rem; }
        
        nav { position: fixed; bottom: 0; left: 75px; right: 0; background: white; padding: 20px; border-top: 1px solid #eee; display: none; justify-content: center; gap: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="sos-sidebar" onclick="handleCrisis()">
    <div id="sos-text">HELP NOW</div>
</div>

<div id="app-shell">
    <div id="screen-gate" class="screen" style="display: flex;">
        <span style="font-size: 4rem; margin-bottom: 10px;">💛</span>
        <h1 style="margin-bottom: 30px;">Unmuted</h1>
        <div class="glass-card login-box">
            <input type="number" id="loginID" placeholder="Enter Student or Staff ID" oninput="checkIDType()">
            <div id="staff-key-container" style="display: none;">
                <input type="password" id="accessKey" placeholder="Enter Staff Access Key">
            </div>
            <button class="btn-primary" onclick="handleLogin()">Sign In</button>
        </div>
        <p style="color: var(--secondary); font-size: 0.8rem; margin-top: 20px;">Safe & Anonymous Student Portal</p>
    </div>

    <div id="screen-mood" class="screen" style="justify-content: center; align-items: center; display: none;">
        <div style="text-align: center; width: 100%; max-width: 600px;">
            <h2>How are you feeling today?</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px;">
                <button onclick="setMood('Happy')" style="background: #ecfdf5; color: #065f46; height: 100px;">😊 Happy</button>
                <button onclick="setMood('Stressed')" style="background: #fffbeb; color: #92400e; height: 100px;">😫 Stressed</button>
                <button onclick="setMood('Sad')" style="background: #eff6ff; color: #1e40af; height: 100px;">😔 Sad</button>
                <button onclick="setMood('Angry')" style="background: #fef2f2; color: #991b1b; height: 100px;">😡 Angry</button>
            </div>
        </div>
    </div>

    <div id="screen-wall" class="screen">
        <div class="glass-card">
            <h2>Anonymous Vent Wall</h2>
            <textarea id="vInput" rows="5" placeholder="Speak your heart... it stays between us." style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee;"></textarea>
            <button class="btn-primary" onclick="submitPost()" style="margin-top:10px;">Post Anonymously</button>
        </div>
        <div id="student-feed"></div>
    </div>

    <div id="screen-staff" class="screen">
        <h2 id="staff-title">Staff Dashboard</h2>
        <div id="staff-feed"></div>
    </div>

    <nav id="bottom-nav">
        <button onclick="nav('wall')" style="width:150px; background:#f8fafc; border:1px solid #e2e8f0;">Wall</button>
        <button onclick="location.reload()" style="width:150px; color:var(--danger); background:none; font-weight:600;">Secure Exit</button>
    </nav>
</div>

<script>
    const KEYS = { CREATOR:"FOUNDER2026", ADMIN:"MASTER2026", COUNSELOR:"HEAL2026", SRO:"SAFE2026" };
    const STAFF_IDS = ["000", "777", "888", "999"];
    const ROSTER = {"1001":"Student A", "1234":"Test User", "5555":"Test Student"};
    const TRIGGERS = ["kill", "die", "hurt", "weapon", "suicide"];
    
    let currentUser = null;
    let currentRole = 'STUDENT';
    let posts = JSON.parse(localStorage.getItem('unmuted_v38') || "[]");

    // Dynamic UI: Show Staff Key only for Staff IDs
    function checkIDType() {
        const id = document.getElementById('loginID').value;
        const keyContainer = document.getElementById('staff-key-container');
        keyContainer.style.display = STAFF_IDS.includes(id) ? 'block' : 'none';
    }

    function handleLogin() {
        const id = document.getElementById('loginID').value;
        const key = document.getElementById('accessKey').value;

        // Staff Authentication
        if (id === "000" && key === KEYS.CREATOR) { currentRole = 'CREATOR'; return launchStaff(); }
        if (id === "888" && key === KEYS.COUNSELOR) { currentRole = 'COUNSELOR'; return launchStaff(); }
        if (id === "777" && key === KEYS.SRO) { currentRole = 'SRO'; return launchStaff(); }
        if (id === "999" && key === KEYS.ADMIN) { currentRole = 'ADMIN'; return launchStaff(); }

        // Student Authentication (ID only)
        if (ROSTER[id]) { 
            currentUser = id; 
            currentRole = 'STUDENT'; 
            nav('mood'); 
            return; 
        }
        
        alert("ID not recognized. Please check with your district administrator.");
    }

    function launchStaff() { nav('staff'); document.getElementById('staff-title').innerText = currentRole + " DASHBOARD"; renderStaffView(); }

    function setMood(m) {
        const t = { 'Happy':['#10b981','KEEP SHINING','0s'], 'Stressed':['#f59e0b','BREATHE','4s'], 'Sad':['#3b82f6','WE ARE HERE','3s'], 'Angry':['#ef4444','HELP NOW','2s'] }[m];
        const bar = document.getElementById('sos-sidebar');
        bar.style.backgroundColor = t[0];
        document.getElementById('sos-text').innerText = t[1];
        bar.style.animation = t[2] !== '0s' ? `pulse-sidebar ${t[2]} infinite` : 'none';
        nav('wall'); renderStudentFeed();
    }

    function submitPost() {
        const txt = document.getElementById('vInput').value;
        if (!txt) return;
        posts.unshift({
            id: Date.now(), authorID: currentUser, text: txt, status: 'OPEN',
            claimedBy: null, emergency: TRIGGERS.some(w => txt.toLowerCase().includes(w)), 
            time: new Date().toLocaleTimeString(), messages: []
        });
        save(); document.getElementById('vInput').value = ""; renderStudentFeed();
    }

    function renderStudentFeed() {
        const feed = document.getElementById('student-feed');
        feed.innerHTML = posts.filter(p => p.status !== 'RESOLVED').map(p => `
            <div class="glass-card">
                <p style="font-size:1.1rem;">${p.text}</p>
                <small style="color:var(--secondary)">${p.time}</small>
            </div>`).join("");
    }

    function renderStaffView() {
        const feed = document.getElementById('staff-feed');
        feed.innerHTML = posts.map(p => `
            <div class="glass-card ${p.emergency ? 'flagged' : ''}">
                <p><b>ID:</b> ${p.authorID}<br>${p.text}</p>
                <button onclick="claim(${p.id})">${p.status}</button>
            </div>`).join("");
    }

    function handleCrisis() { alert("EMERGENCY HELP:\nCall 988 or Text 'HOME' to 741741"); }
    function save() { localStorage.setItem('unmuted_v38', JSON.stringify(posts)); }
    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display='none');
        const active = document.getElementById('screen-'+id);
        active.style.display = (id === 'mood' || id === 'gate') ? 'flex' : 'block';
        document.getElementById('bottom-nav').style.display = (id==='gate'||id==='mood') ? 'none' : 'flex';
    }
</script>
</body>
</html>
